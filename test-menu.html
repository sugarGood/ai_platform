<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜单测试</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; height: 100vh; margin: 0; }
  .sidebar { width: 220px; background: #0F1629; color: white; padding: 20px; }
  .nav-item { padding: 10px; margin: 5px 0; background: #1D2D50; cursor: pointer; border-radius: 8px; }
  .nav-item.active { background: #4F6EF7; }
  .nav-item:hover { background: #3B55E0; }
  .main { flex: 1; padding: 20px; }
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="nav-item active" onclick="showPage('dashboard')">📊 工作台</div>
  <div class="nav-item" onclick="showPage('projects')">📁 项目空间</div>
  <div class="nav-item" onclick="showPage('workflows')">🔀 工作流</div>
</div>

<div class="main">
  <div id="topbar-title">工作台</div>

  <div class="page active" id="page-dashboard">
    <h2>工作台页面</h2>
    <p>这是工作台内容</p>
  </div>

  <div class="page" id="page-projects">
    <h2>项目空间页面</h2>
    <p>这是项目空间内容</p>
  </div>

  <div class="page" id="page-workflows">
    <h2>工作流页面</h2>
    <p>这是工作流内容</p>
  </div>
</div>

<script>
function showPage(name) {
  console.log('showPage called with:', name);

  // 移除所有页面的active类
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  // 移除所有菜单项的active类
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  // 激活目标页面
  const targetPage = document.getElementById('page-' + name);
  if (targetPage) {
    targetPage.classList.add('active');
    console.log('Page activated:', 'page-' + name);
  } else {
    console.error('Page not found:', 'page-' + name);
  }

  // 更新标题
  const titles = {
    dashboard: '工作台',
    projects: '项目空间',
    workflows: '工作流'
  };
  document.getElementById('topbar-title').textContent = titles[name] || name;

  // 激活当前菜单项
  document.querySelectorAll('.nav-item').forEach(item => {
    if(item.getAttribute('onclick') && item.getAttribute('onclick').includes("'" + name + "'")) {
      item.classList.add('active');
      console.log('Menu item activated for:', name);
    }
  });
}

// 测试函数
function testMenu() {
  console.log('Testing menu functionality...');
  setTimeout(() => showPage('projects'), 1000);
  setTimeout(() => showPage('workflows'), 2000);
  setTimeout(() => showPage('dashboard'), 3000);
}

// 页面加载完成后测试
window.addEventListener('DOMContentLoaded', function() {
  console.log('DOM loaded, ready to test');
  // testMenu(); // 取消注释来自动测试
});
</script>

</body>
</html>

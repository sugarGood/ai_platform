<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜单诊断测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
    .success { color: green; }
    .error { color: red; }
    .warning { color: orange; }
    button { margin: 5px; padding: 8px 15px; }
  </style>
</head>
<body>
  <h1>AI Platform 菜单功能诊断</h1>

  <div class="test-section">
    <h2>JavaScript 函数检查</h2>
    <div id="function-check-results"></div>
  </div>

  <div class="test-section">
    <h2>DOM 元素检查</h2>
    <div id="dom-check-results"></div>
  </div>

  <div class="test-section">
    <h2>菜单点击测试</h2>
    <button onclick="testShowPage('dashboard')">测试工作台</button>
    <button onclick="testShowPage('projects')">测试项目空间</button>
    <button onclick="testShowPage('workflows')">测试Agent工作流</button>
    <button onclick="testEnterProject()">测试进入项目</button>
    <button onclick="testExitProject()">测试退出项目</button>
    <div id="menu-test-results"></div>
  </div>

  <script>
    // 导入原型页面的 JavaScript
    function loadMainPageScript() {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = 'ai-platform-prototype.html';
      document.body.appendChild(iframe);

      iframe.onload = function() {
        try {
          const iframeWindow = iframe.contentWindow;

          // 复制函数到当前页面
          window.showPage = iframeWindow.showPage;
          window.enterProject = iframeWindow.enterProject;
          window.exitProject = iframeWindow.exitProject;
          window.showProjectPage = iframeWindow.showProjectPage;

          runDiagnostics();
        } catch (e) {
          document.getElementById('function-check-results').innerHTML =
            '<div class="error">无法加载原型页面函数: ' + e.message + '</div>';
        }
      };
    }

    function runDiagnostics() {
      checkFunctions();
      checkDOMElements();
    }

    function checkFunctions() {
      const results = [];
      const functions = ['showPage', 'enterProject', 'exitProject', 'showProjectPage'];

      functions.forEach(func => {
        if (typeof window[func] === 'function') {
          results.push(`<div class="success">✓ ${func} 函数已定义</div>`);
        } else {
          results.push(`<div class="error">✗ ${func} 函数未定义</div>`);
        }
      });

      document.getElementById('function-check-results').innerHTML = results.join('');
    }

    function checkDOMElements() {
      const results = [];
      const elements = [
        'sidebar-global', 'sidebar-project', 'topbar-title',
        'page-dashboard', 'page-projects', 'page-workflows'
      ];

      elements.forEach(id => {
        const element = document.getElementById(id);
        if (element) {
          results.push(`<div class="success">✓ ${id} 元素存在</div>`);
        } else {
          results.push(`<div class="warning">! ${id} 元素不存在（测试页面正常）</div>`);
        }
      });

      document.getElementById('dom-check-results').innerHTML = results.join('');
    }

    function testShowPage(page) {
      try {
        if (typeof window.showPage === 'function') {
          // 模拟调用
          const result = `<div class="success">✓ showPage('${page}') 调用成功</div>`;
          document.getElementById('menu-test-results').innerHTML = result;
        } else {
          document.getElementById('menu-test-results').innerHTML =
            '<div class="error">✗ showPage 函数不可用</div>';
        }
      } catch (e) {
        document.getElementById('menu-test-results').innerHTML =
          `<div class="error">✗ showPage('${page}') 调用失败: ${e.message}</div>`;
      }
    }

    function testEnterProject() {
      try {
        if (typeof window.enterProject === 'function') {
          const result = `<div class="success">✓ enterProject 调用测试成功</div>`;
          document.getElementById('menu-test-results').innerHTML = result;
        } else {
          document.getElementById('menu-test-results').innerHTML =
            '<div class="error">✗ enterProject 函数不可用</div>';
        }
      } catch (e) {
        document.getElementById('menu-test-results').innerHTML =
          `<div class="error">✗ enterProject 调用失败: ${e.message}</div>`;
      }
    }

    function testExitProject() {
      try {
        if (typeof window.exitProject === 'function') {
          const result = `<div class="success">✓ exitProject 调用测试成功</div>`;
          document.getElementById('menu-test-results').innerHTML = result;
        } else {
          document.getElementById('menu-test-results').innerHTML =
            '<div class="error">✗ exitProject 函数不可用</div>';
        }
      } catch (e) {
        document.getElementById('menu-test-results').innerHTML =
          `<div class="error">✗ exitProject 调用失败: ${e.message}</div>`;
      }
    }

    // 页面加载后开始诊断
    window.onload = function() {
      loadMainPageScript();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>菜单诊断</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .test-btn { padding: 10px 20px; margin: 10px; background: #4F6EF7; color: white; border: none; border-radius: 5px; cursor: pointer; }
  .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; }
</style>
</head>
<body>

<h1>AI Platform 菜单诊断工具</h1>

<button class="test-btn" onclick="testOriginalFile()">测试原始文件</button>
<button class="test-btn" onclick="openOriginalFile()">打开原始文件</button>
<button class="test-btn" onclick="checkConsole()">检查控制台错误</button>

<div id="log" class="log">准备诊断...</div>

<script>
function testOriginalFile() {
  log('开始检查原型文件...');

  // 尝试打开原型文件并检查错误
  const iframe = document.createElement('iframe');
  iframe.src = 'ai-platform-prototype.html';
  iframe.style.width = '100px';
  iframe.style.height = '100px';
  iframe.style.opacity = '0';
  iframe.style.position = 'absolute';
  iframe.style.top = '-200px';

  iframe.onload = function() {
    log('✓ 文件加载成功');
    try {
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      const showPageFunc = iframe.contentWindow.showPage;

      if (typeof showPageFunc === 'function') {
        log('✓ showPage函数存在');

        // 测试函数调用
        try {
          iframe.contentWindow.showPage('projects');
          log('✓ showPage函数可以调用');
        } catch (e) {
          log('✗ showPage函数调用失败: ' + e.message);
        }
      } else {
        log('✗ showPage函数不存在');
      }

      // 检查菜单项
      const menuItems = iframeDoc.querySelectorAll('.nav-item[onclick]');
      log(`✓ 找到 ${menuItems.length} 个菜单项`);

    } catch (e) {
      log('✗ 无法访问iframe内容: ' + e.message);
    }

    document.body.removeChild(iframe);
  };

  iframe.onerror = function() {
    log('✗ 文件加载失败');
    document.body.removeChild(iframe);
  };

  document.body.appendChild(iframe);
}

function openOriginalFile() {
  window.open('ai-platform-prototype.html', '_blank');
  log('已在新窗口打开原型文件，请检查浏览器控制台是否有错误');
}

function checkConsole() {
  log('请在原型文件页面按F12打开开发者工具，查看Console选项卡中的错误信息');
  log('常见错误类型：');
  log('- SyntaxError: 语法错误');
  log('- ReferenceError: 函数未定义');
  log('- TypeError: 元素不存在');
}

function log(message) {
  const logDiv = document.getElementById('log');
  logDiv.innerHTML += '<div>' + new Date().toLocaleTimeString() + ' - ' + message + '</div>';
  logDiv.scrollTop = logDiv.scrollHeight;
}
</script>

</body>
</html>

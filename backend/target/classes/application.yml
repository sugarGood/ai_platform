spring:
  application:
    name: ai-platform-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_platform;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080
